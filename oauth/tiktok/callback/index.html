<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok OAuth Callback</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: #0a0a0a;
    color: #f5f5f0;
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    background: #1a1410;
    padding: 40px;
    border-radius: 12px;
    border: 1px solid #d4af37;
  }
  h1 {
    color: #d4af37;
    margin-top: 0;
    font-size: 28px;
  }
  .status {
    padding: 16px;
    border-radius: 8px;
    margin: 20px 0;
    font-size: 16px;
  }
  .status.ok { background: #1e3a1e; border: 1px solid #4caf50; }
  .status.error { background: #3a1e1e; border: 1px solid #c0392b; }
  .code-box {
    background: #000;
    border: 1px solid #d4af37;
    padding: 16px;
    border-radius: 6px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    word-break: break-all;
    color: #e8c976;
    margin: 12px 0;
    user-select: all;
  }
  .btn {
    display: inline-block;
    background: #d4af37;
    color: #0a0a0a;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
    border: none;
    font-size: 14px;
    margin-top: 8px;
  }
  .btn:hover { background: #e8c976; }
  .btn.copied { background: #4caf50; color: #fff; }
  .step {
    margin: 16px 0;
    padding-left: 24px;
    position: relative;
  }
  .step::before {
    content: "→";
    position: absolute;
    left: 0;
    color: #d4af37;
    font-weight: bold;
  }
  .label {
    color: #888;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  hr {
    border: none;
    border-top: 1px solid #333;
    margin: 24px 0;
  }
  .small { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <h1>TikTok OAuth Callback</h1>

  <div id="result"></div>

  <hr>
  <p class="small">
    這個頁面是內容工廠的 TikTok 授權回呼頁。<br>
    授權成功後,複製上面的 code,回到電腦的 PowerShell 視窗,貼進去即可。
  </p>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const error = params.get("error");
  const errorDesc = params.get("error_description");
  const state = params.get("state");
  const scopes = params.get("scopes");
  const result = document.getElementById("result");

  if (error) {
    result.innerHTML = `
      <div class="status error">
        <strong>❌ 授權失敗</strong><br>
        <strong>error:</strong> ${escapeHtml(error)}<br>
        ${errorDesc ? `<strong>description:</strong> ${escapeHtml(errorDesc)}` : ""}
      </div>
      <div class="step">回到 PowerShell 看錯誤訊息,可能是 redirect_uri 沒對齊或 scope 設定錯誤。</div>
    `;
    return;
  }

  if (!code) {
    result.innerHTML = `
      <div class="status error">
        <strong>⚠️ 沒有收到授權碼</strong><br>
        這個頁面需要從 TikTok 授權流程跳轉過來才會有資料。
      </div>
      <div class="step">請從 PowerShell 跑 <code>python -m src.publishers.tiktok_oauth login</code></div>
    `;
    return;
  }

  result.innerHTML = `
    <div class="status ok">
      <strong>✅ 授權成功!</strong>
    </div>

    <div class="step">
      <div class="label">複製下面的 code</div>
      <div class="code-box" id="codeBox">${escapeHtml(code)}</div>
      <button class="btn" id="copyBtn">📋 複製 code</button>
    </div>

    <div class="step">
      <div class="label">scopes(已授權的權限)</div>
      <div class="small">${escapeHtml(scopes || "(未提供)")}</div>
    </div>

    <div class="step">
      <div class="label">state(CSRF 防護碼)</div>
      <div class="small">${escapeHtml(state || "(未提供)")}</div>
    </div>

    <hr>
    <div class="step">回到 PowerShell 視窗,把 code 貼進去,按 Enter</div>
  `;

  document.getElementById("copyBtn").addEventListener("click", async function() {
    try {
      await navigator.clipboard.writeText(code);
      this.textContent = "✓ 已複製";
      this.classList.add("copied");
      setTimeout(() => {
        this.textContent = "📋 複製 code";
        this.classList.remove("copied");
      }, 2000);
    } catch (e) {
      // fallback
      const range = document.createRange();
      range.selectNode(document.getElementById("codeBox"));
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand("copy");
      this.textContent = "✓ 已複製";
    }
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
})();
</script>
</body>
</html>
